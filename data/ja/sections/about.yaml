# your designation
designation: 経営者×コンサル×エンジニア。現場の情報で経営改善を実現する「専属エンジニア」

# a summary about you
summary: >
  <b>1. 経営者視点で、本当に必要な数字を設計する：</b>
  自社経営の実践から「経営者が見るべきKPIは何か」を理解しています。
  その視点でダッシュボードを設計するため、経営判断に直結した可視化を実現します。<br>
  <b>2. 現場に潜り、課題を一気通貫で解決する：</b>
  業務フロー・顧客データ・売上情報を現場から収集し、最新技術で整理・可視化。
  課題の特定から実装・成果確認まで、専属エンジニアとして責任を持って完遂します。<br>
  <b>3. 過剰開発を排除し、最新技術を驚くほど安価に届ける：</b>
  15年間の製造現場で培った 「ムダ取り」 の精神をシステム開発にも。間に誰も挟まないからこそ、お客様の課題をダイレクトに理解し、過剰な機能を排除した最小限の仕組みを驚くほど短期間で安価に提供します。


